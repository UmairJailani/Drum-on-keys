<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#08080f"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Drum Kit"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Drum Kit</title>
  <meta property="og:title" content="Drum Kit — Electric"/>
  <meta property="og:description" content="Interactive electric drum kit. Play with keyboard, mouse, or touch."/>
  <meta property="og:image" content="https://umairjailani.github.io/Drum-on-keys/preview.png"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <header>
    <h1>DRUM <span>KIT</span></h1>
    <p class="hint">tap pads &nbsp;·&nbsp; W A S D &nbsp;·&nbsp; J K L</p>
    <button id="install-btn" hidden>&#8659; Add to Home Screen</button>
  </header>

  <main class="drum-grid">

    <!-- Row 1: cymbals + high toms -->
    <div class="pad" data-key="k" data-sound="crash"    style="--c:#c084fc;--rgb:192,132,252">
      <span class="key">K</span><span class="name">Crash</span>
    </div>
    <div class="pad" data-key="w" data-sound="tom-1"    style="--c:#f97316;--rgb:249,115,22">
      <span class="key">W</span><span class="name">Hi Tom</span>
    </div>
    <div class="pad" data-key="a" data-sound="tom-2"    style="--c:#fb923c;--rgb:251,146,60">
      <span class="key">A</span><span class="name">Mid Tom</span>
    </div>

    <!-- Row 2: hi-hat + snare + floor tom -->
    <div class="pad" data-key="s" data-sound="tom-3"    style="--c:#4ade80;--rgb:74,222,128">
      <span class="key">S</span><span class="name">Hi-Hat</span>
    </div>
    <div class="pad" data-key="j" data-sound="snare"    style="--c:#38bdf8;--rgb:56,189,248">
      <span class="key">J</span><span class="name">Snare</span>
    </div>
    <div class="pad" data-key="d" data-sound="tom-4"    style="--c:#f97316;--rgb:249,115,22">
      <span class="key">D</span><span class="name">Floor Tom</span>
    </div>

    <!-- Row 3: kick — full width -->
    <div class="pad pad-kick" data-key="l" data-sound="kick-bass" style="--c:#f43f5e;--rgb:244,63,94">
      <span class="key">L</span><span class="name">Kick</span>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
