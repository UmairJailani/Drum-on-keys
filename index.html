<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#06060c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Drum Kit"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Drum Kit</title>
<meta property="og:title" content="Drum Kit — Electric"/>
<meta property="og:image" content="https://umairjailani.github.io/Drum-on-keys/preview.png"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#06060c; }
canvas { display:block; }

/* ── Floating key labels ─────────────────────────────────── */
#labels { position:fixed; inset:0; pointer-events:none; }
.lbl {
  position:absolute;
  transform:translate(-50%,-110%);
  display:flex; flex-direction:column; align-items:center; gap:3px;
  pointer-events:none;
}
.lbl .badge {
  width:30px; height:30px; border-radius:8px;
  background:rgba(4,4,12,0.88);
  border:1.5px solid var(--c,#f97316);
  color:var(--c,#f97316);
  font:700 13px/30px 'SF Mono','Courier New',monospace;
  text-align:center;
  box-shadow:0 0 12px var(--c,#f97316), inset 0 1px 0 rgba(255,255,255,0.08);
  backdrop-filter:blur(6px);
}
.lbl .dname {
  font:600 8px/1 system-ui; text-transform:uppercase;
  letter-spacing:1.2px; color:rgba(255,255,255,0.32); white-space:nowrap;
}
.lbl.lit .badge {
  background:var(--c,#f97316); color:#000;
  box-shadow:0 0 22px var(--c,#f97316), 0 0 48px var(--c,#f97316);
}

/* ── Overlay UI ──────────────────────────────────────────── */
#ui {
  position:fixed; top:0; left:0; right:0;
  padding:14px 22px;
  display:flex; align-items:center; justify-content:space-between;
  pointer-events:none;
}
#brand { font:800 18px/1 system-ui; letter-spacing:5px; text-transform:uppercase; color:#c8a060; }
#brand span { color:#f43f5e; }
#hint  { font:500 10px/1 system-ui; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.16); }

#install-btn {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  display:none; padding:8px 24px;
  border:1.5px solid rgba(200,160,96,0.4); border-radius:20px;
  background:rgba(0,0,0,0.65); color:#c8a060;
  font:500 10px/1 system-ui; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; backdrop-filter:blur(10px); pointer-events:all;
}
</style>
</head>
<body>

<div id="labels"></div>
<div id="ui">
  <div id="brand">DRUM <span>KIT</span></div>
  <div id="hint">W A S D · J K L · or tap</div>
</div>
<button id="install-btn">⬇ Add to Home Screen</button>

<script type="importmap">
{ "imports": {
    "three":          "https://unpkg.com/three@0.158.0/build/three.module.js",

<script type="module">
import * as THREE          from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════
const sounds = {
  w: new Audio('sounds/tom-1.mp3'),
  a: new Audio('sounds/tom-2.mp3'),
  s: new Audio('sounds/tom-3.mp3'),
  d: new Audio('sounds/tom-4.mp3'),
  j: new Audio('sounds/snare.mp3'),
  k: new Audio('sounds/crash.mp3'),
  l: new Audio('sounds/kick-bass.mp3'),
};

// ═══════════════════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace  = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ═══════════════════════════════════════════════════════════
//  SCENE
// ═══════════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06060c);
scene.fog = new THREE.FogExp2(0x06060c, 0.038);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.025).texture;

// ═══════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════
const camera = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.1, 80);
camera.position.set(2.4, 2.9, 5.8);
camera.lookAt(0.3, 0.95, 0);

// ═══════════════════════════════════════════════════════════
//  ORBIT CONTROLS
// ═══════════════════════════════════════════════════════════
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0.3, 0.95, 0);
controls.enableDamping   = true;
controls.dampingFactor   = 0.06;
controls.minPolarAngle   = 0.15;
controls.maxPolarAngle   = Math.PI * 0.48;
controls.minDistance     = 3;
controls.maxDistance     = 14;
controls.update();

// ═══════════════════════════════════════════════════════════
//  LIGHTING  — dramatic rehearsal-room look
// ═══════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x10101e, 2.2));

// Warm overhead spot (key light)
const key = new THREE.SpotLight(0xfff3de, 6, 20, Math.PI / 5.5, 0.5, 1.3);
key.position.set(-0.5, 10, 3.5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1;
key.shadow.camera.far  = 22;
key.shadow.bias = -0.0008;
scene.add(key);

// Cool blue fill — front-left
const fill = new THREE.DirectionalLight(0x2855ff, 0.55);
fill.position.set(-6, 4, 7);
scene.add(fill);

// Orange/red rim from behind
const rim = new THREE.DirectionalLight(0xff5010, 0.75);
rim.position.set(0.5, 3.5, -9);
scene.add(rim);

// Purple accent from right
const acc = new THREE.DirectionalLight(0x7030d0, 0.35);
acc.position.set(9, 2, 1);
scene.add(acc);

// ═══════════════════════════════════════════════════════════
//  TEXTURES
// ═══════════════════════════════════════════════════════════
function makeMeshTex() {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const x = c.getContext('2d');
  x.fillStyle = '#181818'; x.fillRect(0, 0, 512, 512);
  // Woven grid
  x.lineWidth = 0.9;
  for (let i = 0; i < 512; i += 9) {
    x.strokeStyle = `rgba(75,75,75,${0.55 + (i % 18 === 0 ? 0.2 : 0)})`;
    x.beginPath(); x.moveTo(i, 0); x.lineTo(i, 512); x.stroke();
    x.beginPath(); x.moveTo(0, i); x.lineTo(512, i); x.stroke();
  }
  // Sub-grid
  x.strokeStyle = 'rgba(55,55,55,0.3)'; x.lineWidth = 0.5;
  for (let i = 4.5; i < 512; i += 9) {
    x.beginPath(); x.moveTo(i, 0); x.lineTo(i, 512); x.stroke();
    x.beginPath(); x.moveTo(0, i); x.lineTo(512, i); x.stroke();
  }
  // Top sheen
  const g = x.createRadialGradient(160, 140, 0, 256, 256, 220);
  g.addColorStop(0, 'rgba(255,255,255,0.07)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  x.fillStyle = g; x.fillRect(0, 0, 512, 512);
  return new THREE.CanvasTexture(c);
}

function makePadRubberTex() {
  const c = document.createElement('canvas'); c.width = 128; c.height = 64;
  const x = c.getContext('2d');
  x.fillStyle = '#0d0d0d'; x.fillRect(0, 0, 128, 64);
  for (let i = 0; i < 64; i += 2) {
    x.strokeStyle = `rgba(35,35,35,${0.3 + Math.random() * 0.25})`;
    x.lineWidth = 1;
    x.beginPath(); x.moveTo(0, i); x.lineTo(128, i); x.stroke();
  }
  return new THREE.CanvasTexture(c);
}

function makeCymPadTex() {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const x = c.getContext('2d');
  x.fillStyle = '#0c0c0c'; x.fillRect(0, 0, 512, 512);
  x.strokeStyle = 'rgba(42,42,42,0.9)'; x.lineWidth = 1.6;
  for (let r = 20; r < 250; r += 18) {
    x.beginPath(); x.arc(256, 256, r, 0, Math.PI * 2); x.stroke();
  }
  x.strokeStyle = 'rgba(32,32,32,0.6)'; x.lineWidth = 0.8;
  for (let a = 0; a < Math.PI * 2; a += Math.PI / 10) {
    x.beginPath();
    x.moveTo(256 + Math.cos(a) * 20, 256 + Math.sin(a) * 20);
    x.lineTo(256 + Math.cos(a) * 246, 256 + Math.sin(a) * 246);
    x.stroke();
  }
  // Bell dome glow
  const bg = x.createRadialGradient(256, 256, 0, 256, 256, 42);
  bg.addColorStop(0, 'rgba(65,65,65,0.6)');
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  x.fillStyle = bg; x.fillRect(0, 0, 512, 512);
  // Specular sheen
  const sg = x.createRadialGradient(180, 170, 0, 256, 256, 220);
  sg.addColorStop(0, 'rgba(255,255,255,0.06)');
  sg.addColorStop(1, 'rgba(0,0,0,0)');
  x.fillStyle = sg; x.fillRect(0, 0, 512, 512);
  return new THREE.CanvasTexture(c);
}

function makeFloorTex() {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const x = c.getContext('2d');
  x.fillStyle = '#1b130a'; x.fillRect(0, 0, 512, 512);
  for (let i = 0; i < 60; i++) {
    const y = i * 9 + Math.random() * 6;
    x.strokeStyle = `rgba(0,0,0,${0.05 + Math.random() * 0.12})`;
    x.lineWidth   = 1 + Math.random() * 2.5;
    x.beginPath(); x.moveTo(0, y);
    for (let xi = 0; xi < 512; xi += 18)
      x.lineTo(xi, y + Math.sin(xi * 0.04) * 4 + Math.random() * 2);
    x.stroke();
  }
  for (let xi = 65; xi < 512; xi += 68 + Math.random() * 18) {
    x.strokeStyle = 'rgba(0,0,0,0.1)'; x.lineWidth = 1;
    x.beginPath(); x.moveTo(xi, 0); x.lineTo(xi, 512); x.stroke();
  }
  return new THREE.CanvasTexture(c);
}

function makeMatTex() {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const x = c.getContext('2d');
  x.fillStyle = '#080808'; x.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 3500; i++) {
    x.fillStyle = `rgba(22,22,22,${Math.random()})`;
    x.fillRect(Math.random() * 256, Math.random() * 256, 1.2, 1.2);
  }
  return new THREE.CanvasTexture(c);
}

function makeModuleScreenTex() {
  const c = document.createElement('canvas'); c.width = 200; c.height = 100;
  const x = c.getContext('2d');
  x.fillStyle = '#001a2e'; x.fillRect(0, 0, 200, 100);
  // Fake waveform
  x.strokeStyle = '#00e0ff'; x.lineWidth = 1.5;
  x.beginPath();
  for (let i = 0; i < 200; i++) {
    const v = 50 + Math.sin(i * 0.18) * 22 + Math.sin(i * 0.42) * 10 + Math.sin(i * 0.09) * 14;
    i === 0 ? x.moveTo(i, v) : x.lineTo(i, v);
  }
  x.stroke();
  // BPM readout
  x.fillStyle = '#00e0ff'; x.font = 'bold 22px monospace'; x.fillText('128', 8, 30);
  x.font = '10px monospace'; x.fillStyle = 'rgba(0,220,255,0.55)';
  x.fillText('BPM', 52, 26);
  x.fillStyle = '#00ff88'; x.font = 'bold 13px monospace'; x.fillText('V-DRUMS', 8, 90);
  return new THREE.CanvasTexture(c);
}

const meshTex   = makeMeshTex();
const rubberTex = makePadRubberTex();
const cymTex    = makeCymPadTex();
const floorTex  = makeFloorTex();
const matTex    = makeMatTex();
const screenTex = makeModuleScreenTex();

floorTex.wrapS  = floorTex.wrapT  = THREE.RepeatWrapping; floorTex.repeat.set(7, 7);
matTex.wrapS    = matTex.wrapT    = THREE.RepeatWrapping;  matTex.repeat.set(4, 3);
rubberTex.wrapS = rubberTex.wrapT = THREE.RepeatWrapping;  rubberTex.repeat.set(5, 1);

// ═══════════════════════════════════════════════════════════
//  MATERIALS
// ═══════════════════════════════════════════════════════════
const chromeMat = new THREE.MeshStandardMaterial({
  color: 0xd2d4d8, roughness: 0.06, metalness: 1.0,
});
const blackRubber = new THREE.MeshStandardMaterial({
  map: rubberTex, color: 0x111111, roughness: 0.96, metalness: 0,
});
const meshHeadMat = new THREE.MeshStandardMaterial({
  map: meshTex, color: 0x888888, roughness: 0.9, metalness: 0,
});
const cymPadMat = new THREE.MeshStandardMaterial({
  map: cymTex, color: 0x999999, roughness: 0.87, metalness: 0,
});
const darkPlastic = new THREE.MeshStandardMaterial({
  color: 0x0c0c0c, roughness: 0.55, metalness: 0.08,
});
const moduleScreenMat = new THREE.MeshStandardMaterial({
  map: screenTex, emissiveMap: screenTex, emissive: 0xffffff,
  emissiveIntensity: 0.65, roughness: 0.3, metalness: 0,
});

// ═══════════════════════════════════════════════════════════
//  HELPER: tube between two world points, added to parent
// ═══════════════════════════════════════════════════════════
function tube(x1, y1, z1, x2, y2, z2, r = 0.018, mat = chromeMat, parent = scene) {
  const s = new THREE.Vector3(x1, y1, z1);
  const e = new THREE.Vector3(x2, y2, z2);
  const d = new THREE.Vector3().subVectors(e, s);
  const L = d.length();
  if (L < 0.001) return;
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, L, 10), mat);
  m.position.addVectors(s, e).multiplyScalar(0.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), d.normalize());
  m.castShadow = true;
  parent.add(m);
  return m;
}

// ═══════════════════════════════════════════════════════════
//  HIT REGISTRY
// ═══════════════════════════════════════════════════════════
const drumPieces = {};   // key → { group, initRx, initRz }
const hitObjects  = [];  // flat list of Meshes for raycasting

function registerPad(key, group, initRx = 0, initRz = 0) {
  group.traverse(obj => {
    if (obj.isMesh) { obj.userData.key = key; hitObjects.push(obj); }
  });
  drumPieces[key] = { group, initRx, initRz };
}

// ═══════════════════════════════════════════════════════════
//  FLOOR + RUBBER MAT
// ═══════════════════════════════════════════════════════════
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.92, metalness: 0 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const drumMat = new THREE.Mesh(
  new THREE.BoxGeometry(4.0, 0.014, 3.2),
  new THREE.MeshStandardMaterial({ map: matTex, color: 0x060606, roughness: 0.98, metalness: 0 })
);
drumMat.position.set(0.1, 0.007, 0.5);
drumMat.receiveShadow = true;
scene.add(drumMat);

// ═══════════════════════════════════════════════════════════
//  RACK FRAME  (Roland MDS-Compact style)
// ═══════════════════════════════════════════════════════════
const RH = 1.70;   // rack height at post top
const RW = 1.26;   // half-width of rack

// Rear vertical posts
tube(-RW, 0, -0.52,  -RW, RH, -0.52, 0.020);
tube( RW, 0, -0.52,   RW, RH, -0.52, 0.020);

// Top horizontal bar (rear)
tube(-RW, RH, -0.52,  RW, RH, -0.52, 0.020);

// Upper cross bar (slightly lower)
tube(-RW, 1.38, -0.52,  RW, 1.38, -0.52, 0.018);

// Angled side arms — from top of posts sweeping forward
tube(-RW, RH, -0.52,  -RW, 1.10, 0.38, 0.018);
tube( RW, RH, -0.52,   RW, 1.10, 0.38, 0.018);

// Front cross bar connecting arm ends
tube(-RW, 1.10, 0.38,  RW, 1.10, 0.38, 0.018);

// Lower side stabiliser bars
tube(-RW, 0.05, -0.52,  -RW, 0.05, 0.50, 0.014);
tube( RW, 0.05, -0.52,   RW, 0.05, 0.50, 0.014);

// Post feet / rubber caps
for (const sx of [-RW, RW]) {
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.030, 0.030, 0.042, 8), darkPlastic);
  cap.position.set(sx, 0.021, -0.52); cap.castShadow = true; scene.add(cap);
}

// Clamp rings on the rear bar for arms + accessories
for (const cx of [-RW * 0.55, -RW * 0.15, RW * 0.15, RW * 0.55]) {
  const cl = new THREE.Mesh(new THREE.TorusGeometry(0.022, 0.010, 6, 12), chromeMat);
  cl.rotation.x = Math.PI / 2; cl.position.set(cx, 1.38, -0.52); scene.add(cl);
}

// ═══════════════════════════════════════════════════════════
//  DRUM PAD BUILDER  (mesh head + chrome rim + lugs)
// ═══════════════════════════════════════════════════════════
function buildDrumPad(r, h = 0.072) {
  const grp = new THREE.Group();

  // Shell: [side, top=mesh, bottom]
  const shell = new THREE.Mesh(
    new THREE.CylinderGeometry(r, r, h, 32),
    [blackRubber, meshHeadMat, blackRubber]
  );
  shell.castShadow = true; grp.add(shell);

  // Chrome top rim
  const rimTop = new THREE.Mesh(
    new THREE.TorusGeometry(r + 0.014, 0.013, 6, 32), chromeMat
  );
  rimTop.rotation.x = Math.PI / 2;
  rimTop.position.y  = h / 2 + 0.003;
  rimTop.castShadow  = true; grp.add(rimTop);

  // Chrome bottom rim
  const rimBot = rimTop.clone(); rimBot.position.y = -(h / 2 + 0.003);
  grp.add(rimBot);

  // Tension lugs (count scales with radius)
  const lugCount = Math.max(6, Math.round(r * 80));
  const lugGeo   = new THREE.BoxGeometry(0.014, 0.018, 0.016);
  for (let i = 0; i < lugCount; i++) {
    const a = (i / lugCount) * Math.PI * 2;
    const lug = new THREE.Mesh(lugGeo, chromeMat);
    lug.position.set(Math.cos(a) * (r + 0.017), 0, Math.sin(a) * (r + 0.017));
    lug.rotation.y = -a; grp.add(lug);
  }

  return grp;
}

// ═══════════════════════════════════════════════════════════
//  CYMBAL PAD BUILDER  (octagonal rubber, Roland CY-8 style)
// ═══════════════════════════════════════════════════════════
function buildCymPad(r, sides = 8, tiltX = 0.18, tiltZ = 0) {
  const pivot = new THREE.Group();

  // Main body
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(r, r * 0.90, 0.024, sides),
    cymPadMat
  );
  body.castShadow = true; pivot.add(body);

  // Edge chrome strip
  const edge = new THREE.Mesh(
    new THREE.TorusGeometry(r, 0.009, 5, sides), chromeMat
  );
  edge.rotation.x = Math.PI / 2; edge.position.y = 0.006; pivot.add(edge);

  // Bell bump
  const bell = new THREE.Mesh(
    new THREE.SphereGeometry(r * 0.21, 12, 8, 0, Math.PI * 2, 0, Math.PI * 0.48),
    new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.75, metalness: 0.05 })
  );
  bell.position.y = 0.014; pivot.add(bell);

  // Zone ring (dual-zone indicator ring)
  const zone = new THREE.Mesh(
    new THREE.TorusGeometry(r * 0.58, 0.007, 4, sides), chromeMat
  );
  zone.rotation.x = Math.PI / 2; zone.position.y = 0.013; pivot.add(zone);

  pivot.rotation.x = tiltX;
  pivot.rotation.z = tiltZ;
  return pivot;
}

// ═══════════════════════════════════════════════════════════
//  STAND BUILDER  (3-leg tripod + pole, direct to scene)
// ═══════════════════════════════════════════════════════════
function buildStand(px, pz, poleH, legSpread = 0.32) {
  for (let i = 0; i < 3; i++) {
    const a  = (i / 3) * Math.PI * 2;
    const lx = px + Math.cos(a) * legSpread;
    const lz = pz + Math.sin(a) * legSpread;
    tube(px, 0.022, pz,  lx, 0.022, lz, 0.009);
    const foot = new THREE.Mesh(new THREE.SphereGeometry(0.017, 6, 6), darkPlastic);
    foot.position.set(lx, 0.017, lz); scene.add(foot);
  }
  tube(px, 0, pz,  px, poleH, pz, 0.013);
}

// ═══════════════════════════════════════════════════════════
//  ARM MOUNT  (rack arm from attach point to pad bracket)
// ═══════════════════════════════════════════════════════════
function buildArm(ax, ay, az,  bx, by, bz) {
  tube(ax, ay, az,  bx, by, bz, 0.012);
  const br = new THREE.Mesh(new THREE.BoxGeometry(0.038, 0.032, 0.038), chromeMat);
  br.position.set(bx, by, bz); br.castShadow = true; scene.add(br);
}

// ═══════════════════════════════════════════════════════════
//  SNARE  (J)  —  PDX-12 style, 12" mesh
// ═══════════════════════════════════════════════════════════
{
  const pad = buildDrumPad(0.152, 0.082);
  pad.position.set(-0.85, 0.82, 0.32);
  scene.add(pad);

  buildStand(-0.85, 0.32, 0.95);

  // Snare wire strands under shell
  const wMat = new THREE.MeshStandardMaterial({ color: 0xb8b8b8, roughness: 0.3, metalness: 0.85 });
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const w = new THREE.Mesh(new THREE.CylinderGeometry(0.002, 0.002, 0.30, 4), wMat);
    w.position.set(-0.85 + Math.cos(a) * 0.10, 0.77, 0.32 + Math.sin(a) * 0.10);

  }

  registerPad('j', pad);
}

// ═══════════════════════════════════════════════════════════
//  HI-HAT  (S)  —  2× CY-5 with controller stand
// ═══════════════════════════════════════════════════════════
const HH_X = -1.52, HH_Z = 0.28;
{
  // 3-leg stand + pole
  for (let i = 0; i < 3; i++) {
    const a  = (i / 3) * Math.PI * 2;
    tube(HH_X, 0.022, HH_Z,  HH_X + Math.cos(a) * 0.28, 0.022, HH_Z + Math.sin(a) * 0.28, 0.008);
  }
  tube(HH_X, 0, HH_Z,  HH_X, 1.05, HH_Z, 0.013);

  // Clutch collar on pole
  const collar = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.038, 8), chromeMat);
  collar.position.set(HH_X, 0.98, HH_Z); scene.add(collar);

  // Top pad (slightly tilted)
  const top = buildCymPad(0.128, 8, 0.08, -0.02);
  top.position.set(HH_X, 1.04, HH_Z);
  scene.add(top);

  // Bottom pad (nearly flat, inverted)
  const bot = buildCymPad(0.128, 8, -0.06, 0.02);
  bot.position.set(HH_X, 1.00, HH_Z);
  scene.add(bot);

  // Foot pedal board
  const ped = new THREE.Mesh(
    new THREE.BoxGeometry(0.11, 0.018, 0.30),
    new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.85, metalness: 0.18 })
  );
  ped.position.set(HH_X, 0.009, HH_Z + 0.10);

  // Hinge at top of footboard

  // Pull rod from pedal to lifting arm
  tube(HH_X, 0.018, HH_Z + 0.24,  HH_X, 0.60, HH_Z, 0.007);

  // Register — both cymbal meshes respond to 's'
  top.traverse(o => { if (o.isMesh) { o.userData.key = 's'; hitObjects.push(o); } });

{

    strip.position.set(0, 0.002, 0.06 + s * 0.056); pedGrp.add(strip);
  }

  // Hinge bar
  tube(-0.052, 0.010, 0, 0.052, 0.010, 0, 0.012, chromeMat, pedGrp);

  // Connecting rod (rises from hinge to beater)
  const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.007, 0.007, 0.28, 6), chromeMat);
  rod.position.set(0, 0.14, 0.02); rod.rotation.x = 0.28; pedGrp.add(rod);

  // Cam wheel at top of rod
  const cam = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.028, 8), chromeMat);
  cam.position.set(0, 0.27, -0.04); cam.rotation.z = Math.PI / 2; pedGrp.add(cam);

  // Beater shaft
  const bShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.007, 0.007, 0.30, 6), chromeMat);
  bShaft.position.set(0, 0.27, 0.02); bShaft.rotation.x = 0.35; pedGrp.add(bShaft);

  // Beater head (felt ball)
  const bHead = new THREE.Mesh(
    new THREE.SphereGeometry(0.030, 10, 10),
    new THREE.MeshStandardMaterial({ color: 0x303030, roughness: 0.95, metalness: 0 })
  );
  bHead.position.set(0, 0.41, 0.115); pedGrp.add(bHead);

  // Spring
  const springMat = new THREE.MeshStandardMaterial({ color: 0xb0b0b0, roughness: 0.3, metalness: 0.9 });
  for (let si = 0; si < 10; si++) {
    const sa = (si / 10) * Math.PI * 2;
    const sy = si * 0.016;
    const sp = new THREE.Mesh(new THREE.SphereGeometry(0.006, 5, 5), springMat);
    sp.position.set(0.025 * Math.cos(sa), 0.04 + sy, 0.025 * Math.sin(sa) - 0.04);

  pedGrp.position.set(0, 0, 0.10);
  kGrp.add(pedGrp);

  kGrp.position.set(0.08, 0, 0.78);
  scene.add(kGrp);
  registerPad('l', kGrp);
}

// ═══════════════════════════════════════════════════════════
//  DRUM STICKS  (resting near kick)
// ═══════════════════════════════════════════════════════════
{

// ═══════════════════════════════════════════════════════════
//  HIT GLOW LIGHTS  (one PointLight per pad, off by default)
// ═══════════════════════════════════════════════════════════
const PAD_COLORS = {
  j: 0x38bdf8,  // snare — blue
  s: 0x4ade80,  // hi-hat — green
  w: 0xf97316,  // hi-tom — orange
  a: 0xfb923c,  // mid-tom — amber
  d: 0xf97316,  // floor tom — orange
  k: 0xc084fc,  // crash — purple
  l: 0xf43f5e,  // kick — red
};
const hitLights = {};
Object.entries(PAD_COLORS).forEach(([key, col]) => {
  const pl = new THREE.PointLight(col, 0, 3.2, 2.0);
  scene.add(pl);
  hitLights[key] = pl;
});

// ═══════════════════════════════════════════════════════════
//  LABELS
// ═══════════════════════════════════════════════════════════
const LABEL_DATA = [
  { key:'j', name:'Snare',     color:'#38bdf8', pos: new THREE.Vector3(-0.85, 1.08, 0.32) },
  { key:'s', name:'Hi-Hat',    color:'#4ade80', pos: new THREE.Vector3(-1.52, 1.24, 0.28) },
  { key:'w', name:'Hi-Tom',    color:'#f97316', pos: new THREE.Vector3(-0.30, 1.40,-0.14) },
  { key:'a', name:'Mid-Tom',   color:'#fb923c', pos: new THREE.Vector3( 0.44, 1.44,-0.22) },
  { key:'d', name:'Floor Tom', color:'#f97316', pos: new THREE.Vector3( 1.30, 0.98, 0.38) },
  { key:'k', name:'Crash',     color:'#c084fc', pos: new THREE.Vector3(-1.62, 1.82,-0.18) },
  { key:'l', name:'Kick',      color:'#f43f5e', pos: new THREE.Vector3( 0.08, 0.44, 0.78) },
];

const labelsDiv = document.getElementById('labels');
const labelEls  = {};
LABEL_DATA.forEach(({ key, name, color, pos }) => {
  const el = document.createElement('div');
  el.className = 'lbl';
  el.style.setProperty('--c', color);
  el.innerHTML = `<div class="badge">${key.toUpperCase()}</div><div class="dname">${name}</div>`;
  labelsDiv.appendChild(el);
  labelEls[key] = { el, worldPos: pos };
});

function updateLabels() {
  const v = new THREE.Vector3();
  Object.entries(labelEls).forEach(([key, { el, worldPos }]) => {
    v.copy(worldPos).project(camera);
    el.style.left    = ((v.x + 1) * 0.5 * window.innerWidth)  + 'px';
    el.style.top     = ((-v.y + 1) * 0.5 * window.innerHeight) + 'px';
    el.style.opacity = v.z < 1 ? '1' : '0';
  });
}

// ═══════════════════════════════════════════════════════════
//  ANIMATION SYSTEM
// ═══════════════════════════════════════════════════════════
const activeAnims = [];

function triggerPad(key) {
  const piece = drumPieces[key];
  if (!piece) return;

  // Flash label
  const lbl = labelEls[key];
  if (lbl) {
    lbl.el.classList.add('lit');
    setTimeout(() => lbl.el.classList.remove('lit'), 200);
  }

  // Play sound
  const snd = sounds[key];
  if (snd) { snd.currentTime = 0; snd.play().catch(() => {}); }

  // Glow light burst at pad centre
  const pl = hitLights[key];
  if (pl) {
    const wp = new THREE.Vector3();
    piece.group.getWorldPosition(wp);
    pl.position.copy(wp).setY(wp.y + 0.15);
    pl.intensity = 4.5;
  }

  // Kill any existing animation for this key to avoid fighting
  for (let i = activeAnims.length - 1; i >= 0; i--) {
    if (activeAnims[i].key === key) activeAnims.splice(i, 1);
  }

  const grp = piece.group;
  let t = 0;
  let fn;

  if (key === 'l') {
    // Kick bass: compress Z scale
    fn = () => {
      t += 0.10;
      grp.scale.z = 1 - Math.sin(t * 3.0) * 0.065 * Math.exp(-t * 2.8);
      if (pl) pl.intensity = Math.max(0, 4.5 * Math.exp(-t * 5.5));
      return t < 2.8;
    };
  } else if (key === 'k') {
    // Crash: wobble rotation
    const { initRx, initRz } = piece;
    fn = () => {
      t += 0.055;
      grp.rotation.x = initRx + Math.sin(t * 7.5) * 0.16 * Math.exp(-t * 3.2);
      grp.rotation.z = initRz + Math.sin(t * 5.5 + 1) * 0.09 * Math.exp(-t * 3.2);
      if (pl) pl.intensity = Math.max(0, 4.5 * Math.exp(-t * 4.5));
      return t < 3.2;
    };
  } else if (key === 's') {
    // Hi-hat: quick dip
    const oy = grp.position.y;
    fn = () => {
      t += 0.09;
      grp.position.y = oy - Math.abs(Math.sin(t * 6)) * 0.018 * Math.exp(-t * 4);
      if (pl) pl.intensity = Math.max(0, 4.5 * Math.exp(-t * 6));
      return t < 2.0;
    };
  } else {
    // Drum pads (j, w, a, d): bounce down
    const oy = grp.position.y;
    fn = () => {
      t += 0.11;
      grp.position.y = oy + Math.sin(t * 5) * 0.020 * Math.exp(-t * 4.0);
      if (pl) pl.intensity = Math.max(0, 4.5 * Math.exp(-t * 7));
      return t < 2.5;
    };
  }

  if (fn) activeAnims.push({ key, fn, grp, piece });
}

// ═══════════════════════════════════════════════════════════
//  INPUT: mouse + touch (raycasting)
// ═══════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const ptr       = new THREE.Vector2();

function onPointerDown(e) {
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  ptr.x =  (cx / window.innerWidth)  * 2 - 1;
  ptr.y = -(cy / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(ptr, camera);
  const hits = raycaster.intersectObjects(hitObjects);
  if (hits.length) {
    const k = hits[0].object.userData.key;
    if (k) triggerPad(k);
  }
}

window.addEventListener('mousedown', onPointerDown);
window.addEventListener('touchstart', e => { e.preventDefault(); onPointerDown(e); }, { passive: false });

// ═══════════════════════════════════════════════════════════
//  INPUT: keyboard
// ═══════════════════════════════════════════════════════════
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  if (drumPieces[k]) triggerPad(k);
});

// ═══════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Tick all active pad animations
  for (let i = activeAnims.length - 1; i >= 0; i--) {
    const anim     = activeAnims[i];
    const running  = anim.fn();
    if (!running) {
      const { key, grp, piece } = anim;
      // Snap back cleanly
      if (key === 'l') { grp.scale.z = 1; }
      if (key === 'k' && piece) {
        grp.rotation.x = piece.initRx;
        grp.rotation.z = piece.initRz;
      }
      activeAnims.splice(i, 1);
    }
  }

  updateLabels();
  renderer.render(scene, camera);
}
animate();

// ═══════════════════════════════════════════════════════════
//  PWA
// ═══════════════════════════════════════════════════════════
if ('serviceWorker' in navigator)
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));

let deferred = null;
const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferred = e; installBtn.style.display = 'block';
});
installBtn.addEventListener('click', async () => {
  if (!deferred) return;
  deferred.prompt(); await deferred.userChoice;
  deferred = null; installBtn.style.display = 'none';
});
window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

</script>
